<div class="auth-page">
  <div class="auth-card">
    <p class="eyebrow">Task Manager</p>
    <h2>Create Account</h2>
    <p class="auth-subtitle">Sign up to start organizing your tasks.</p>

    <p class="message" *ngIf="message">{{ message }}</p>
    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

    <form (ngSubmit)="onSignup()">
      <div class="form-group">
        <label>Name</label>
        <input
          type="text"
          placeholder="Enter name"
          [(ngModel)]="name"
          name="name"
          required
        >
        <small class="field-error" *ngIf="nameError">{{ nameError }}</small>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          placeholder="Enter email"
          [(ngModel)]="email"
          name="email"
          required
        >
        <small class="field-error" *ngIf="emailError">{{ emailError }}</small>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          placeholder="Enter password"
          [(ngModel)]="password"
          name="password"
          required
        >
        <small class="field-error" *ngIf="passwordError">{{ passwordError }}</small>
      </div>

      <button type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Creating account...' : 'Signup' }}
      </button>
    </form>

    <p class="auth-link">
      Already have an account?
      <a routerLink="/login">Login</a>
    </p>
  </div>
</div>
