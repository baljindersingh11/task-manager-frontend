<div class="dashboard">
  <header class="dashboard-header">
    <div>
      <p class="eyebrow">Task Manager</p>
      <h2>My Tasks</h2>
    </div>
  </header>

  <p class="message" *ngIf="message">{{ message }}</p>
  <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

  <form class="task-form" (ngSubmit)="createTask()">
    <div class="task-fields">
      <div class="task-input-group">
        <label for="taskTitle">New task</label>
        <input
          id="taskTitle"
          type="text"
          placeholder="Enter a new task"
          [(ngModel)]="newTaskTitle"
          name="newTaskTitle"
          required
        >
        <small class="field-error" *ngIf="titleError">{{ titleError }}</small>
      </div>

      <div class="task-input-group">
        <label for="taskDueDate">Due date (optional)</label>
        <input
          id="taskDueDate"
          type="date"
          [(ngModel)]="newTaskDueDate"
          name="newTaskDueDate"
        >
      </div>
    </div>

    <button type="submit" [disabled]="isCreatingTask">
      {{ isCreatingTask ? 'Adding...' : 'Add Task' }}
    </button>
  </form>

  <p class="loading" *ngIf="isLoadingTasks">Loading tasks...</p>

  <div class="filter-tabs" *ngIf="!isLoadingTasks && tasks.length > 0">
    <button
      type="button"
      [class.active]="currentFilter === 'all'"
      (click)="setFilter('all')"
    >
      All
    </button>

    <button
      type="button"
      [class.active]="currentFilter === 'pending'"
      (click)="setFilter('pending')"
    >
      Pending
    </button>

    <button
      type="button"
      [class.active]="currentFilter === 'completed'"
      (click)="setFilter('completed')"
    >
      Completed
    </button>
  </div>

  <div class="empty-state" *ngIf="!isLoadingTasks && tasks.length === 0">
    <h3>No tasks yet</h3>
    <p>Add your first task above to start organizing your day.</p>
  </div>

  <div class="empty-state" *ngIf="!isLoadingTasks && tasks.length > 0 && filteredTasks.length === 0">
    <h3>No tasks found</h3>
    <p>Try another filter.</p>
  </div>

  <ul class="task-list" *ngIf="!isLoadingTasks && filteredTasks.length > 0">
    <li *ngFor="let task of filteredTasks" class="task-item">
      <label>
        <input
          type="checkbox"
          [checked]="task.completed"
          [disabled]="updatingTaskId === getTaskId(task) || deletingTaskId === getTaskId(task)"
          (change)="toggleTask(task)"
        >
        <span class="task-content">
          <span [class.completed]="task.completed">{{ task.title }}</span>
          <small *ngIf="task.dueDate">
            Due: {{ task.dueDate | date:'mediumDate':'UTC' }}
          </small>
        </span>
      </label>

      <button
        type="button"
        class="delete-button"
        [disabled]="deletingTaskId === getTaskId(task)"
        (click)="deleteTask(task)"
      >
        {{ deletingTaskId === getTaskId(task) ? 'Deleting...' : 'Delete' }}
      </button>
    </li>
  </ul>
</div>
