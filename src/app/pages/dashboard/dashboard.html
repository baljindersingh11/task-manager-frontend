<div class="dashboard">
  <header class="dashboard-header">
    <h2>My Tasks</h2>
    <button type="button" (click)="logout()">Logout</button>
  </header>

  <p class="message" *ngIf="message">{{ message }}</p>
  <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

  <form class="task-form" (ngSubmit)="createTask()">
    <input
      type="text"
      placeholder="Enter a new task"
      [(ngModel)]="newTaskTitle"
      name="newTaskTitle"
      required
    >
    <button type="submit" [disabled]="isCreatingTask">
      {{ isCreatingTask ? 'Adding...' : 'Add Task' }}
    </button>
  </form>

  <p *ngIf="isLoadingTasks">Loading tasks...</p>
  <p *ngIf="!isLoadingTasks && tasks.length === 0">No tasks yet.</p>

  <ul class="task-list" *ngIf="!isLoadingTasks && tasks.length > 0">
    <li *ngFor="let task of tasks" class="task-item">
      <label>
        <input
          type="checkbox"
          [checked]="task.completed"
          [disabled]="updatingTaskId === getTaskId(task) || deletingTaskId === getTaskId(task)"
          (change)="toggleTask(task)"
        >
        <span [class.completed]="task.completed">{{ task.title }}</span>
      </label>

      <button
        type="button"
        class="delete-button"
        [disabled]="deletingTaskId === getTaskId(task)"
        (click)="deleteTask(task)"
      >
        {{ deletingTaskId === getTaskId(task) ? 'Deleting...' : 'Delete' }}
      </button>
    </li>
  </ul>
</div>
